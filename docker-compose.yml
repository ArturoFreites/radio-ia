x-app-env: &app-env
  DATABASE_URL: postgresql://radioflow:radioflow@db:5432/radioflow
  REDIS_URL: redis://redis:6379
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
  ELEVENLABS_MODEL_ID: ${ELEVENLABS_MODEL_ID:-eleven_turbo_v2_5}
  ELEVENLABS_PREVIEW_MODEL_ID: ${ELEVENLABS_PREVIEW_MODEL_ID:-eleven_multilingual_v2}
  ELEVENLABS_OUTPUT_FORMAT: ${ELEVENLABS_OUTPUT_FORMAT:-mp3_44100_128}
  ELEVENLABS_DEFAULT_VOICE_ID: ${ELEVENLABS_DEFAULT_VOICE_ID:-QK4xDwo9ESPHA4JNUpX3}
  ELEVENLABS_FREE_FALLBACK_VOICE_ID: ${ELEVENLABS_FREE_FALLBACK_VOICE_ID:-JBFqnCBsd6RMkjVDRZzb}
  ELEVENLABS_QUOTA_ALERTA_MIN: ${ELEVENLABS_QUOTA_ALERTA_MIN:-}
  ELEVENLABS_QUOTA_BLOQUEO_MIN: ${ELEVENLABS_QUOTA_BLOQUEO_MIN:-}
  GEMINI_COST_INPUT_USD_PER_1M: ${GEMINI_COST_INPUT_USD_PER_1M:-0.30}
  GEMINI_COST_OUTPUT_USD_PER_1M: ${GEMINI_COST_OUTPUT_USD_PER_1M:-2.50}
  ELEVENLABS_COST_FLASH_USD_PER_1K_CHARS: ${ELEVENLABS_COST_FLASH_USD_PER_1K_CHARS:-0.05}
  ELEVENLABS_COST_MULTILINGUAL_USD_PER_1K_CHARS: ${ELEVENLABS_COST_MULTILINGUAL_USD_PER_1K_CHARS:-0.10}
  AUDIO_STORAGE_PATH: /app/storage/audio
  SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
  SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
  SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-http://localhost:3000/api/spotify/callback}
  SPOTIFY_DEFAULT_MARKET: ${SPOTIFY_DEFAULT_MARKET:-AR}
  DOCKER_SKIP_SEED: ${DOCKER_SKIP_SEED:-0}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      <<: *app-env
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    volumes:
      - audio_storage:/app/storage/audio
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      <<: *app-env
    volumes:
      - audio_storage:/app/storage/audio
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: radioflow
      POSTGRES_PASSWORD: radioflow
      POSTGRES_DB: radioflow
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radioflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  audio_storage:
